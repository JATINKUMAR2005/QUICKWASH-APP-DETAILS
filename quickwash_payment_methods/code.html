<style>

            opacity: 0.9;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        }

        .selection-glow {

        .fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .material-symbols-outlined {

<script>
        // Micro-interaction for payment options selection
        document.querySelectorAll('input[name="payment_method"]').forEach(input => {
            input.addEventListener('change', function() {
                // Remove visual selection from all
                document.querySelectorAll('.glass-surface').forEach(card => {
                    card.classList.remove('selection-glow', 'bg-white/10');
                });
                
                // Add to selected
                if (this.checked) {
                    const container = this.nextElementSibling;
                    container.classList.add('selection-glow', 'bg-white/10');
                    
                    // Trigger a tiny haptic-like scale effect on selection
                    container.animate([
                        { transform: 'scale(1)' },
                        { transform: 'scale(0.98)' },
                        { transform: 'scale(1)' }
                    ], {
                        duration: 200,
                        easing: 'cubic-bezier(0.4, 0, 0.2, 1)'
                    });
                }
            });
        });

        // Background parallax effect
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            document.querySelector('webgl-shader').style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    </script>
