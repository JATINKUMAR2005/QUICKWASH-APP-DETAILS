<style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-blur: blur(20px);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0e1322;
            color: #dee1f7;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.1);
        }
        .glow-accent {
            box-shadow: 0 0 20px rgba(76, 215, 246, 0.15);
        }
        .toggle-switch {
            appearance: none;
            width: 44px;
            height: 24px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            position: relative;
            cursor: pointer;
            outline: none;
            transition: background 0.3s ease;
            border: 1px solid var(--glass-border);
        }
        .toggle-switch::before {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            background: white;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .toggle-switch:checked {
            background: #03b5d3;
        }
        .toggle-switch:checked::before {
            transform: translateX(20px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes fadeInSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-entrance {
            animation: fadeInSlideUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
    </style>

<script>
        // Micro-interaction for toggle switches
        document.querySelectorAll('.toggle-switch').forEach(toggle => {
            toggle.addEventListener('change', function() {
                // Haptic feedback simulation if supported
                if (window.navigator && window.navigator.vibrate) {
                    window.navigator.vibrate(5);
                }
            });
        });

        // Add subtle parallax effect on cards based on touch/mouse
        document.addEventListener('mousemove', (e) => {
            const cards = document.querySelectorAll('.glass-card');
            const mouseX = e.clientX / window.innerWidth - 0.5;
            const mouseY = e.clientY / window.innerHeight - 0.5;
            
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const cardCenterX = rect.left + rect.width / 2;
                const cardCenterY = rect.top + rect.height / 2;
                
                // Only affect visible cards
                if (rect.top < window.innerHeight && rect.bottom > 0) {
                    const moveX = mouseX * 5;
                    const moveY = mouseY * 5;
                    card.style.transform = `translate(${moveX}px, ${moveY}px)`;
                }
            });
        });
    </script>
