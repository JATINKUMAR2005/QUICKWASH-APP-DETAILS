<style>
        body {
            background-color: #0e1322;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
        }
        .glass-panel {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-input:focus {
            border-color: #4cd7f6;
            box-shadow: 0 0 12px rgba(76, 215, 246, 0.2);
            outline: none;
            background: rgba(255, 255, 255, 0.08);
        }
        .glass-button-primary {
            background: linear-gradient(135deg, #aac7ff 0%, #4cd7f6 100%);
            opacity: 0.9;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-button-primary:active {
            transform: scale(0.96);
            opacity: 1;
        }
        .animate-fade-up {
            animation: fadeUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-container-padding">
<!-- Atmospheric Background Animation -->

<!-- Main Content Canvas -->
<main class="w-full max-w-[420px] animate-fade-up">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-xl">
<div class="w-20 h-20 rounded-full flex items-center justify-center bg-primary-container/20 border border-primary/30 shadow-[0_0_24px_rgba(170,199,255,0.3)] mb-md">
<span class="material-symbols-outlined text-primary text-[48px]" style="font-variation-settings: 'FILL' 1;">local_laundry_service</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight drop-shadow-[0_0_8px_rgba(170,199,255,0.5)]">
                QuickWash
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-base">The future of clean is here.</p>
</div>
<!-- Auth Card -->
<div class="glass-panel p-lg rounded-xl shadow-2xl">
<form class="space-y-lg" id="signInForm" onsubmit="event.preventDefault()">
<!-- Email Input -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-base">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant/50 text-[20px]">mail</span>
<input class="glass-input w-full h-14 pl-12 pr-md rounded-xl font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/30" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-xs">
<div class="flex justify-between items-center px-base">
<label class="font-label-md text-label-md text-on-surface-variant">Password</label>
<a class="font-label-md text-label-md text-secondary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant/50 text-[20px]">lock</span>
<input class="glass-input w-full h-14 pl-12 pr-md rounded-xl font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/30" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Sign In Button -->
<button class="glass-button-primary w-full h-14 rounded-xl font-title-md text-title-md text-on-primary-fixed flex items-center justify-center gap-sm" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center my-lg gap-md">
<div class="h-[1px] flex-1 bg-white/12"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Or sign in with phone</span>
<div class="h-[1px] flex-1 bg-white/12"></div>
</div>
<!-- OTP Login Option -->
<button class="glass-input w-full h-14 rounded-xl font-title-md text-title-md text-on-surface flex items-center justify-center gap-sm hover:bg-white/10 active:scale-[0.98]" onclick="showOTPFlow()">
<span class="material-symbols-outlined text-[20px]">smartphone</span>
                Sign in with Phone Number
            </button>
<!-- Footer Links -->
<div class="mt-lg text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-secondary font-bold hover:underline ml-xs" href="#">Create an account</a>
</p>
</div>
</div>
<!-- Secondary Info (Optional Decorative) -->
<div class="mt-xl grid grid-cols-2 gap-md opacity-60">
<div class="glass-panel p-sm rounded-lg flex items-center gap-sm">
<span class="material-symbols-outlined text-secondary text-[18px]">verified_user</span>
<span class="font-label-sm text-label-sm text-on-surface">Secure Cloud Sync</span>
</div>
<div class="glass-panel p-sm rounded-lg flex items-center gap-sm">
<span class="material-symbols-outlined text-secondary text-[18px]">bolt</span>
<span class="font-label-sm text-label-sm text-on-surface">Express Checkout</span>
</div>
</div>
</main>
<!-- Micro-interaction Script -->
<script>
        function showOTPFlow() {
            // Simulated transition to OTP Flow
            const mainCanvas = document.querySelector('main');
            mainCanvas.style.opacity = '0';
            mainCanvas.style.transform = 'translateY(-20px)';
            mainCanvas.style.transition = 'all 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
            
            setTimeout(() => {
                alert('Redirecting to secure OTP verification flow...');
                mainCanvas.style.opacity = '1';
                mainCanvas.style.transform = 'translateY(0)';
            }, 600);
        }

        // Add focus effect listeners to containers for subtle card glow changes
        const inputs = document.querySelectorAll('.glass-input');
        const card = document.querySelector('.glass-panel');

        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                card.style.boxShadow = '0 0 40px rgba(76, 215, 246, 0.1)';
                card.style.borderColor = 'rgba(76, 215, 246, 0.2)';
            });
            input.addEventListener('blur', () => {
                card.style.boxShadow = '0 25px 50px -12px rgba(0, 0, 0, 0.5)';
                card.style.borderColor = 'rgba(255, 255, 255, 0.12)';
            });
        });
    </script>
</body></html>
