<style>
        body {
            background-color: #0e1322;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .glass-btn-primary {
            background: linear-gradient(135deg, #1a6bcc 0%, #03b5d3 100%);
            opacity: 0.9;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
        }

        .glass-btn-primary:active {
            transform: scale(0.96);
            opacity: 1;
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-input:focus-within {
            border-color: #4cd7f6;
            box-shadow: 0 0 12px rgba(76, 215, 246, 0.2);
        }

        .fade-slide-up {
            animation: fadeSlideUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 3s infinite linear;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="min-h-screen flex flex-col items-center justify-center p-container-padding selection:bg-secondary/30">
<!-- Atmospheric Background Animation -->

<main class="w-full max-w-[400px] z-10 flex flex-col items-center">
<!-- Logo Section -->

</div>

<div class="glass-input rounded-xl flex items-center p-1 px-4 h-14">
<div class="flex items-center gap-1 pr-3 border-r border-white/12 cursor-pointer hover:text-secondary transition-colors group">
<img class="w-5 h-4 object-cover rounded-sm" data-alt="A small detailed icon of the Indian national flag with high-fidelity texture and vibrant saffron, white, and green colors, designed for a modern UI profile setting. The background of the flag is slightly blurred to emphasize the fabric weave." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDKEA9Ah-kw0cREhUrulZ4RJlnCVGIpSSmU42Vdu_utK0WnU64wu3LoLnpLvwP0jmb_y7xKDbrln4NuJaEjrEZysZV53jb9GUCzgDfmnOIqVQKdTR6H4eABgCkYTrxdho7VlRtYnM8UmIV3uyys6vNSsBkN2rvlXAw-cuzzNMQoD-6UOIwESfsQfn6Fv--QRZYsvjEAjbpzulTMn6VJj-4y5xlZWc30_Xa3IwGb3k2bzGs6gGEDCG-jLigiF_wmlRvoVoCiG46zJ9s"/>
<span class="font-title-md text-title-md text-on-surface">+91</span>

</button>
</div>

<!-- Visual Polish: Background Glows -->
<div class="fixed top-1/4 -left-20 w-64 h-64 bg-primary/10 rounded-full blur-[100px] pointer-events-none -z-10"></div>
<div class="fixed bottom-1/4 -right-20 w-64 h-64 bg-secondary/10 rounded-full blur-[100px] pointer-events-none -z-10"></div>
<script>
        // Simple input focus interaction
        const input = document.querySelector('input');
        const container = input.closest('.glass-input');

        input.addEventListener('focus', () => {
            container.classList.add('ring-1', 'ring-secondary/50');
        });

        input.addEventListener('blur', () => {
            container.classList.remove('ring-1', 'ring-secondary/50');
        });

        // Numeric entry restriction
        input.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });

        // Micro-interaction for buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function(e) {
                let x = e.clientX - e.target.offsetLeft;
                let y = e.clientY - e.target.offsetTop;
                let ripples = document.createElement('span');
                ripples.style.left = x + 'px';
                ripples.style.top = y + 'px';
                this.appendChild(ripples);
                setTimeout(() => {
                    ripples.remove();
                }, 1000);
            });
        });
    </script>
</body></html>
