<script>
        const prices = {
            'q-jeans': 49,
            'q-trousers': 45,
            'q-shorts': 35,
            'q-skirts': 39
        };

        const quantities = {
            'q-jeans': 0,
            'q-trousers': 0,
            'q-shorts': 0,
            'q-skirts': 0
        };

        function increment(id) {
            quantities[id]++;
            document.getElementById(id).textContent = quantities[id];
            updateTotal();
            triggerHaptic();
        }

        function decrement(id) {
            if (quantities[id] > 0) {
                quantities[id]--;
                document.getElementById(id).textContent = quantities[id];
                updateTotal();
                triggerHaptic();
            }
        }

        function updateTotal() {
            let total = 0;
            for (const key in quantities) {
                total += quantities[key] * prices[key];
            }
            document.getElementById('total-price').textContent = `₹${total}`;
        }

        function triggerHaptic() {
            if (window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
        }

        // Initialize
        updateTotal();
    </script>
